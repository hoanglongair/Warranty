<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield Icon -->
  <path d="M30 10 L10 18 L10 30 L30 50 L50 30 L50 18 Z" fill="url(#logoGrad)" filter="url(#glow)"/>
  <path d="M30 18 L18 23 L18 30 L30 42 L42 30 L42 23 Z" fill="#0F172A"/>
  <circle cx="30" cy="30" r="5" fill="url(#logoGrad)"/>
  
  <!-- Text: WARRANTY -->
  <text x="65" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">Warranty</text>
</svg>
